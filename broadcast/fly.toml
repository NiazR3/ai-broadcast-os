# fly.toml — Fly.io app configuration
# Deploy: fly launch --ha=false (first time) then fly deploy
app = "broadcast-os"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8100
  force_https = true
  auto_stop_machines = false    # Streaming must never sleep
  auto_start_machines = false
  min_machines_running = 1
  max_machines_running = 3

[[services]]
  port = 80
  protocol = "tcp"

[services.concurrency]
  type = "connections"
  hard_limit = 250
  soft_limit = 200

[[services.ports]]
  port = 80
  handlers = ["http"]
  force_https = true

[[services.ports]]
  port = 443
  handlers = ["tls", "http"]

# Persistent volume for SQLite (analytics, personas)
[mounts]
  source = "broadcast_data"
  destination = "/app/broadcast/broadcast_data"

[env]
  BROADCAST_HOST = "0.0.0.0"
  BROADCAST_PORT = "8100"
  BROADCAST_SERVICE_NAME = "ai-broadcast-os"
  # Set these via `fly secrets set` (never in this file):
  #   BROADCAST_API_KEY
  #   BROADCAST_CORS_ORIGINS
  #   BROADCAST_WEBSOCKET_ALLOWED_ORIGINS
  #   BROADCAST_OBS_PASSWORD
  #   BROADCAST_TWITCH_STREAM_KEY
  #   BROADCAST_YOUTUBE_STREAM_KEY
  #   BROADCAST_FACEBOOK_STREAM_KEY

[metrics]
  port = 8100
  path = "/metrics"
