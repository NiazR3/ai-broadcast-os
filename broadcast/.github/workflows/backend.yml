name: Backend Deploy

on:
  push:
    branches: [master, main]
    paths-ignore:
      - "dashboard/**"
      - "docs/**"
      - "**.md"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to production VPS"
        required: true
        default: true
        type: boolean

env:
  DOCKER_IMAGE: ghcr.io/${{ github.repository }}/broadcast

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pytest httpx pytest-asyncio

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  build-and-push:
    name: Build & Push Docker Image
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ steps.sha.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: [build-and-push]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT || '22' }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd /opt/broadcast/app

            # Pull latest code
            git pull origin master

            # Pull latest Docker image
            docker compose -f docker-compose.prod.yml pull broadcast

            # Update env file with API key from GitHub secret
            if [ -n "${{ secrets.BROADCAST_API_KEY }}" ]; then
              sed -i "s/BROADCAST_API_KEY=.*/BROADCAST_API_KEY=${{ secrets.BROADCAST_API_KEY }}/" .env.production
            fi

            # Recreate services with zero-downtime
            docker compose -f docker-compose.prod.yml up -d --no-deps --build broadcast

            # Clean up old images
            docker image prune -f
