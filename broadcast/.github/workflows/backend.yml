name: Backend Deploy

on:
  push:
    branches: [master, main]
    paths-ignore:
      - "dashboard/**"
      - "docs/**"
      - "**.md"
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pytest httpx pytest-asyncio

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  deploy:
    name: Deploy to Fly.io
    needs: [test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Set secrets
        run: |
          flyctl secrets set \
            BROADCAST_API_KEY="${{ secrets.BROADCAST_API_KEY }}" \
            BROADCAST_CORS_ORIGINS="${{ secrets.BROADCAST_CORS_ORIGINS }}" \
            BROADCAST_WEBSOCKET_ALLOWED_ORIGINS="${{ secrets.BROADCAST_WEBSOCKET_ALLOWED_ORIGINS }}" \
            BROADCAST_OBS_PASSWORD="${{ secrets.BROADCAST_OBS_PASSWORD }}" \
          --app broadcast-os
        continue-on-error: true

      - name: Deploy to Fly.io
        uses: superfly/flyctl-actions/deploy@master
        with:
          args: "--ha=false --strategy immediate"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
