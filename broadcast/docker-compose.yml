version: "3.9"

services:
  broadcast:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8100:8100"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Mount host broadcast/ directory so source changes hot-reload
      - .:/app/broadcast
    restart: unless-stopped
