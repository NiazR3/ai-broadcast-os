version: "3.9"

services:
  broadcast:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8100"
    env_file:
      - .env.production
    volumes:
      - broadcast_data:/app/broadcast/broadcast_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - broadcast_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./dashboard/dist:/usr/share/nginx/html:ro
    depends_on:
      broadcast:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - broadcast_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  broadcast_data:

networks:
  broadcast_net:
    driver: bridge
